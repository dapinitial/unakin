# DigitalOcean Functions config for the /api/signup waitlist endpoint.
# RESEND_API_KEY is set as an encrypted env var on the App Platform Function
# component (Settings → Environment Variables) and App Platform injects it
# into the function runtime — no project.yml binding needed (and a ${...}
# binding here fails the build if it can't resolve at build time).
packages:
  - name: api
    functions:
      - name: signup
        runtime: 'nodejs:18'
        web: true
        limits:
          timeout: 10000
